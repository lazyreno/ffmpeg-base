name: Build Desktop FFmpeg SDK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-desktop.yml"
      - "cmake-package/**"
      - "config/**"
      - "scripts/**"
      - "templates/**"
      - "tests/**"
      - "triplets/**"
      - "vcpkg.json"
      - "vcpkg-configuration.json"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-desktop.yml"
      - "cmake-package/**"
      - "config/**"
      - "scripts/**"
      - "templates/**"
      - "tests/**"
      - "triplets/**"
      - "vcpkg.json"
      - "vcpkg-configuration.json"

permissions:
  contents: read

jobs:
  prepare-matrix:
    name: Prepare SDK Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      sdk_version: ${{ steps.matrix.outputs.sdk_version }}
      vcpkg_commit: ${{ steps.matrix.outputs.vcpkg_commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate production declarations
        run: |
          python3 -m json.tool config/sdk-version.json >/dev/null
          python3 -m json.tool config/ffmpeg-profile.json >/dev/null
          python3 -m json.tool config/platform-matrix.json >/dev/null
          python3 -m json.tool config/source-lock.json >/dev/null
          python3 -m json.tool config/vcpkg-lock.json >/dev/null
          python3 -m json.tool vcpkg.json >/dev/null
          python3 -m json.tool vcpkg-configuration.json >/dev/null
          cmake -P tests/cmake/test_release_workflow.cmake

      - name: Generate build matrix
        id: matrix
        run: python3 scripts/generate-github-matrix.py --github-output "$GITHUB_OUTPUT"

  build-sdk:
    name: ${{ matrix.key }} SDK
    needs: prepare-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout pinned vcpkg
        uses: actions/checkout@v5
        with:
          repository: microsoft/vcpkg
          ref: ${{ needs.prepare-matrix.outputs.vcpkg_commit }}
          path: .vcpkg-root

      - name: Show macOS runner
        if: matrix.buildFamily == 'macos'
        run: |
          sw_vers
          uname -a
          clang --version
          cmake --version

      - name: Setup MSYS2
        if: matrix.buildFamily == 'windows-msvc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          path-type: inherit
          update: true
          install: >-
            base-devel
            diffutils
            make

      - name: Setup MSVC
        if: matrix.buildFamily == 'windows-msvc'
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstall = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsInstall) {
            throw "Visual Studio with MSVC tools was not found."
          }

          $vcvars = Join-Path $vsInstall "VC\Auxiliary\Build\vcvarsall.bat"
          if (!(Test-Path $vcvars)) {
            throw "vcvarsall.bat was not found: $vcvars"
          }

          $arch = "${{ matrix.msvcArch }}"
          $envLines = cmd /s /c "`"$vcvars`" $arch && set"
          $exportNames = @(
            "CommandPromptType",
            "DevEnvDir",
            "EXTERNAL_INCLUDE",
            "FrameworkDir",
            "FrameworkDir64",
            "FrameworkVersion",
            "FrameworkVersion64",
            "INCLUDE",
            "LIB",
            "LIBPATH",
            "NETFXSDKDir",
            "Path",
            "Platform",
            "UCRTVersion",
            "UniversalCRTSdkDir",
            "VCIDEInstallDir",
            "VCINSTALLDIR",
            "VCToolsInstallDir",
            "VCToolsRedistDir",
            "VCToolsVersion",
            "VisualStudioVersion",
            "VSINSTALLDIR",
            "WindowsLibPath",
            "WindowsSdkBinPath",
            "WindowsSdkDir",
            "WindowsSDKLibVersion",
            "WindowsSdkVerBinPath",
            "WindowsSDKVersion"
          )
          foreach ($line in $envLines) {
            $parts = $line -split "=", 2
            if ($parts.Count -eq 2 -and $exportNames -contains $parts[0]) {
              "$($parts[0])=$($parts[1])" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Bootstrap pinned vcpkg on macOS
        if: matrix.buildFamily == 'macos'
        run: ./.vcpkg-root/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap pinned vcpkg on Windows
        if: matrix.buildFamily == 'windows-msvc'
        shell: pwsh
        run: |
          & "${{ github.workspace }}\.vcpkg-root\bootstrap-vcpkg.bat" -disableMetrics
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Install macOS x64 assembler tool
        if: matrix.buildFamily == 'macos' && matrix.arch == 'x86_64'
        run: |
          rm -rf /usr/local/Homebrew/Library/Taps/aws/homebrew-tap
          rm -rf /opt/homebrew/Library/Taps/aws/homebrew-tap
          brew install nasm

      - name: Show Windows runner
        if: matrix.buildFamily == 'windows-msvc'
        shell: pwsh
        run: |
          systeminfo | Select-String "OS Name", "OS Version", "System Type"
          clang-cl --version | Select-Object -First 1
          link 2>&1 | Select-Object -First 1
          cmake --version
          bash --version

      - name: Install macOS LGPL codec dependencies
        if: matrix.buildFamily == 'macos'
        run: |
          "${{ github.workspace }}/.vcpkg-root/vcpkg" install \
            --vcpkg-root "${{ github.workspace }}/.vcpkg-root" \
            --triplet "${{ matrix.triplet }}" \
            --x-install-root "${{ github.workspace }}/.vcpkg-installed" \
            --clean-after-build

      - name: Install Windows LGPL codec dependencies
        if: matrix.buildFamily == 'windows-msvc'
        shell: pwsh
        run: |
          $vcpkgRoot = "${{ github.workspace }}\.vcpkg-root"
          & "$vcpkgRoot\vcpkg.exe" install `
            --vcpkg-root "$vcpkgRoot" `
            --triplet "${{ matrix.triplet }}" `
            --x-install-root "${{ github.workspace }}/.vcpkg-installed" `
            --clean-after-build
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build macOS SDK
        if: matrix.buildFamily == 'macos'
        env:
          SDK_ARCH: ${{ matrix.arch }}
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg-root
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/.vcpkg-installed
        run: scripts/build-macos.sh

      - name: Build Windows SDK
        if: matrix.buildFamily == 'windows-msvc'
        shell: pwsh
        env:
          SDK_ARCH: ${{ matrix.arch }}
          VCPKG_ROOT: ${{ github.workspace }}\.vcpkg-root
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/.vcpkg-installed
        run: scripts/build-windows-msvc.ps1

      - name: Upload SDK archive
        uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-sdk-${{ matrix.key }}
          path: |
            dist/ffmpeg-sdk-*-${{ matrix.key }}.zip
            dist/ffmpeg-sdk-*-${{ matrix.key }}.zip.sha256
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - prepare-matrix
      - build-sdk
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: ffmpeg-sdk-release-${{ needs.prepare-matrix.outputs.sdk_version }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download SDK artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ffmpeg-sdk-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sdk_version="${{ needs.prepare-matrix.outputs.sdk_version }}"
          ffmpeg_version="$(python3 -c 'import json; print(json.load(open("config/sdk-version.json"))["ffmpegVersion"])')"
          release_tag="v${sdk_version}"
          release_title="FFmpeg SDK ${ffmpeg_version} v${sdk_version}"
          release_base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match SDK version ${release_tag}." >&2
            exit 1
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "Release ${release_tag} already exists. Publish a new sdkVersion instead of replacing it." >&2
            exit 1
          fi

          python3 scripts/generate-artifact-index.py \
            --release-assets release-assets \
            --output release-assets/artifact-index.json \
            --base-url "${release_base_url}" \
            --release-tag "${release_tag}"

          mapfile -t release_files < <(find release-assets -type f \( -name 'ffmpeg-sdk-*.zip' -o -name 'ffmpeg-sdk-*.zip.sha256' -o -name 'artifact-index.json' \) | sort)
          if [[ "${#release_files[@]}" -eq 0 ]]; then
            echo "No SDK release files were downloaded." >&2
            exit 1
          fi

          release_args=(
            gh release create "${release_tag}"
            "${release_files[@]}"
            --title "${release_title}"
            --notes "Cloud-built FFmpeg SDK for desktop clients. This release is immutable; publish a new sdkVersion for rebuilds."
          )

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            release_args+=(--target "${GITHUB_SHA}")
          fi

          "${release_args[@]}"
